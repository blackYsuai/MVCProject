<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все люди</title>
</head>
<body>
<div th:each="person:${people}">
    <a th:href="@{/people/{id}(id=${person.getId()})}"
       th:text="${person.getFull_name()+', '+person.getYear()}">Person's information</a>
</div>
<br/>
<hr/>
<a href="people/add">Добавить человека</a>
</body>
</html>
