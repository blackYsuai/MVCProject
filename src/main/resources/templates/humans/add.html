<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление человека</title>
</head>
<body>
<form th:method="POST" th:action="@{/people}" th:object="${person}" >

    <label for="full_name">Enter full name: </label>
    <input type="text" th:field="*{full_name}" id="full_name"/>
    <div style="color:red" th:if="${#fields.hasErrors('full_name')}" th:errors="*{full_name}">Error for full name</div>
    <br/>

    <label for="year">Enter year of birthday: </label>
    <input type="text" th:field="*{year}" id="year"/>
    <div style="color:red" th:if="${#fields.hasErrors('year')}" th:errors="*{year}">Error for year</div>
    <br/>

    <input type="submit" value="Create!"/>
</form>
</body>
</html>
